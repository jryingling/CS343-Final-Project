<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokédex - Pokémon Dashboard</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/pokedex.css">
</head>
<body>

  <header class="site-header">
    <div class="header-top">
      <img src="../images/homepage/homepage-pikachu.png" alt="Pikachu logo" class="site-logo">
      <h1>Pokédex</h1>
   

    <nav class="main-nav">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="favorites.html">Favorites</a></li>
        <li><a href="teams.html">Teams</a></li>
      </ul>
    </nav>

      <div class="profile-display" id="profileDisplay">
        <button id="edit-profile-btn">Edit</button>
        <span id="display-name">Trainer</span>
        <img id="display-pic" src="../images/homepage/homepage-pikachu.png" alt="Profile" width="40">

        <div class="stats-container">
          <button id="statsBtn">Stats</button>

          <div class="stats-popup">
            <h3>Trainer Stats</h3>

            <p id="totalFavorites">Total Favorites: 0</p>
            <p id="totalTeams">Total Teams: 0</p>

            <canvas id="generationChart" width="500" height="300"></canvas>
          </div>
        </div>
      </div>
     </div>
  </header>

  <section id="profile-editor" hidden>
    <h2>Edit Profile</h2>

    <input type="text" id="trainer-name" placeholder="Enter name">

    <input type="file" id="profile-pic-input" accept="image/*">

    <button id="save-profile">Save</button>
  </section>

  <main class="pokedex-layout">

    <section class="pokedex-header">
      <h2>Pokédex</h2>
      <p>Browse and search for Pokémon.</p>
    </section>

    <section class="search-section">
      <h2>Search</h2>
      <form class="search-form" id="pokedex-search-form">
        <label for="pokemon-search" class="sr-only">Search for Pokémon</label>
        <input type="text" id="pokemon-search" name="pokemon-search" placeholder="Search for Pokémon..." list="pokemon-list">
        <datalist id="pokemon-list"></datalist>
        <button type="submit">GO</button>
      </form>
      <p id="search-error" class="search-error" hidden></p>
    </section>

    <section class="pokedex-content" id="pokemon-detail">
      <img id="sprite">
      <p id="name"></p>
      <p id="height"></p>
      <p id="weight"></p>
      <img id="officialArt">
    </section>

    <section class="type-filter-section">
      <h2>Browse by Type</h2>
      <div id="type-buttons"></div>
    </section>

    <section id="type-results-section" hidden>
      <h3 id="type-results-title"></h3>
      <ul id="type-results"></ul>
      <button id="load-more">Load More</button>
    </section>

  </main>

  <footer class="site-footer">
    <p>Gotta Catch 'Em All!</p>
  </footer>

  <script src="../scripts/util.js"></script>
  <script src="../scripts/nav.js"></script>
  <script src="../scripts/trainer.js"></script>
  <script src="../scripts/pokedex.js"></script>
  <script src="../scripts/pokedexEvents.js"></script>
</body>
</html>

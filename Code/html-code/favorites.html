  <link rel="stylesheet" href="css/global.css">

</head>
<body>

  <header class="site-header">
    <div class="header-top">
      <img src="../images/homepage/homepage-pikachu.png" alt="Pikachu logo" class="site-logo">
      <h1>Favorites</h1>
    
    <nav class="main-nav">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="teams.html">Teams</a></li>
        <li><a href="pokedex.html">Pokédex</a></li>
      </ul>
    </nav>

      <div class="profile-display" id="profileDisplay">
        <button id="edit-profile-btn">Edit</button>
        <span id="display-name">Trainer</span>
        <img id="display-pic" src="../images/homepage/homepage-pikachu.png" alt="Profile" width="40">

        <div class="stats-container">
          <button id="statsBtn">Stats</button>

          <div class="stats-popup">
            <h3>Trainer Stats</h3>

            <p id="totalFavorites">Total Favorites: 0</p>
            <p id="totalTeams">Total Teams: 0</p>

            <canvas id="generationChart" width="500" height="300"></canvas>
          </div>
        </div>
      </div>
    </div>
  </header>

  <section id="profile-editor" hidden>
    <h2>Edit Profile</h2>

    <input type="text" id="trainer-name" placeholder="Enter name">

    <input type="file" id="profile-pic-input" accept="image/*">

    <button id="save-profile">Save</button>
  </section>

  <main class="favorites-layout">
    <section class="favorites-header" id="favoritesheader">
      <h2>Your Favorite Pokémon</h2>
      <p>Click a Pokémon to view more details.</p>
    </section>

    <div class="favorites-controls">
      <button id="showSearchBtn" hidden>Add a Favorite</button>
      <button id="editFavoritesBtn">Edit Favorites</button>
    </div>

<section class="favorites-grid" id="favoritesSection">

    <section id="searchSection" hidden>
      <h2>Search Pokémon</h2>
      <h3 id="searchTitle" hidden>Search by Pokedex Number or Name!</h3>

      <input id="pokemon-search" list="pokemon-list" type="text">
      <datalist id="pokemon-list"></datalist>
      <button id="searchBtn">Search</button>

      <p id="search-error" hidden></p>
      <button id="cancelSearchBtn" hidden>Back to Favorites</button>
      <h4 id="pokemon-name" hidden></h4>
      <img id="randomMon" hidden>
      <button id="officialAdd" hidden>Add to Favorites</button> 
    </section>

    <p>Gotta Catch 'Em All!</p>

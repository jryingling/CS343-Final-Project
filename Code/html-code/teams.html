<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teams - Pokémon Dashboard</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>

  <header class="site-header">
    <div class="header-top">
      <img src="../images/homepage/homepage-pikachu.png" alt="Pikachu logo" class="site-logo">
      <h1>Teams</h1>
   

    <nav class="main-nav">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="favorites.html">Favorites</a></li>
        <li><a href="pokedex.html">Pokédex</a></li>
      </ul>
    </nav>
     </div>
  </header>

  <main class="teams-layout">

    <section class="teams-header">
      <h2>Your Teams</h2>
      <p>Build and manage your Pokémon teams.</p>
    </section>

    <section class="teams-grid">

      <!-- Team Card -->
      <article class="team-card">
        <h3>Team 1</h3>

        <div class="team-members">
          <div class="pokemon-slot">Slot 1</div>
          <div class="pokemon-slot">Slot 2</div>
          <div class="pokemon-slot">Slot 3</div>
          <div class="pokemon-slot">Slot 4</div>
          <div class="pokemon-slot">Slot 5</div>
          <div class="pokemon-slot">Slot 6</div>
        </div>

        <button class="team-action">Edit Team</button>
      </article>

      <article class="team-card">
        <h3>Team 2</h3>

        <div class="team-members">
          <div class="pokemon-slot">Slot 1</div>
          <div class="pokemon-slot">Slot 2</div>
          <div class="pokemon-slot">Slot 3</div>
          <div class="pokemon-slot">Slot 4</div>
          <div class="pokemon-slot">Slot 5</div>
          <div class="pokemon-slot">Slot 6</div>
        </div>

        <button class="team-action">Edit Team</button>
      </article>

      <!-- Add New Team -->
      <article class="team-card add-team">
        <h3>+ Create New Team</h3>
      </article>

    </section>

  </main>

  <footer class="site-footer">
    <p> Gotta Catch 'Em All!</p>
  </footer>

</body>
</html>

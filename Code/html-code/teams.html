<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teams - Pokémon Dashboard</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/teams.css">
</head>
<body>

  <header class="site-header">
    <div class="header-top">
      <img src="../images/homepage/homepage-pikachu.png" alt="Pikachu logo" class="site-logo">
      <h1>Teams</h1>
   

    <nav class="main-nav">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="favorites.html">Favorites</a></li>
        <li><a href="pokedex.html">Pokédex</a></li>
      </ul>
    </nav>

      <div class="profile-display" id="profileDisplay">
        <button id="edit-profile-btn">Edit</button>
        <span id="display-name">Trainer</span>
        <img id="display-pic" src="../images/homepage/homepage-pikachu.png" alt="Profile" width="40">

        <div class="stats-container">
          <button id="statsBtn">Stats</button>

          <div class="stats-popup">
            <h3>Trainer Stats</h3>

            <p id="totalFavorites">Total Favorites: 0</p>
            <p id="totalTeams">Total Teams: 0</p>

            <canvas id="generationChart" width="500" height="300"></canvas>
          </div>
        </div>
      </div>
     </div>
  </header>

  <section id="profile-editor" hidden>
    <h2>Edit Profile</h2>

    <input type="text" id="trainer-name" placeholder="Enter name">

    <input type="file" id="profile-pic-input" accept="image/*">

    <button id="save-profile">Save</button>
  </section>

  <main class="teams-layout">

    <section class="teams-header">
      <h2>Your Teams</h2>
      <p>Build and manage your Pokémon teams.</p>
      <label>
        <input type="checkbox" id="showSprites" checked>
        Show Pokémon sprites
      </label>
    </section>

    <div id="slotModal" hidden>
      <h3>Add Pokémon to Slot</h3>
      <input id="slotSearch" type="text" placeholder="Name or Pokédex #">
      <button id="slotSearchBtn">Search</button>
      <p id="slotError" hidden></p>
      <div id="slotResult"></div>
      <button id="slotConfirm" hidden>Add Pokémon</button>
      <button id="slotCancel">Cancel</button>
    </div>

    <section class="teams-grid">

      <article class="team-card add-team" id="addTeamCard">
        <h3>+ Create New Team</h3>
      </article>

      <article class="team-card" id="createTeamForm" hidden>
        <label for="teamNameInput">Team Name:</label>
        <input id="teamNameInput" type="text" placeholder="My Team">
        <button id="confirmCreateTeam">Create</button>
        <button id="cancelCreateTeam">Cancel</button>
      </article>

    </section>

  </main>

  <footer class="site-footer">
    <p> Gotta Catch 'Em All!</p>
  </footer>

  <script src="../scripts/util.js"></script>
  <script src="../scripts/trainer.js"></script>
  <script src="../scripts/team.js"></script>
  <script src="../scripts/teamEvents.js"></script>
</body>
</html>
